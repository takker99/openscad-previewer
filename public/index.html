<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OpenSCAD WASM Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
      }
      body {
        background: #0b0b0b;
        color: #e5e5e5;
        font: 13px system-ui, sans-serif;
      }
      header {
        padding: 6px 10px;
        border-bottom: 1px solid #222;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .ok {
        color: #22c55e;
      }
      .err {
        color: #ef4444;
      }
      .warn {
        color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
